name: Weekly Happy Letter Scraper

on:
  schedule:
    # 한국 시간 기준(UTC+9) 매주 일요일 오전 5시 정각 실행 (UTC 기준 토요일 20:00)
    - cron: '0 20 * * 0'
  workflow_dispatch:
    # 깃허브 페이지에서 수동으로도 즉시 실행 버튼을 누를 수 있도록 허용

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 firebase-admin

    - name: Create serviceAccountKey.json from secrets
      # Firebase Admin 인증 비공개 키를 깃허브 시크릿에서 받아와 임시 생성합니다.
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > serviceAccountKey.json

    - name: Run Crawler & Sync to Firebase Firestore
      run: |
        python happy_scrapper.py
