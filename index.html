<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#fff7ed">
  <title>당목담글 - 마음을 잇는 따뜻한 소리</title>
  
  <!-- Web App Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/love-letter.png">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Dexie.js (IndexedDB library) -->
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Gaegu:wght@400;700&family=Gowun+Batang:wght@400;700&family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background: linear-gradient(135deg, #fffaf4 0%, #ffeeda 50%, #ffdcb4 100%);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    .font-warm {
      font-family: 'Gowun Batang', serif;
    }

    .font-comfort {
      font-family: 'Comfortaa', cursive;
    }

    .font-cute {
      font-family: 'Gaegu', cursive;
    }

    /* Micro-interaction & Active Scaling */
    .touch-target {
      touch-action: manipulation;
    }
    .touch-target:active {
      transform: scale(0.95);
    }

    /* Glassmorphism Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px rgba(251, 146, 60, 0.08);
    }

    /* Golden-Orange Soft Glows */
    .glow-orange {
      box-shadow: 0 0 25px rgba(251, 146, 60, 0.35);
    }

    /* Custom scrollbar for premium look */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(251, 146, 60, 0.3);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-between pb-8">

  <!-- Warm background light circles -->
  <div class="fixed top-[-10%] left-[-20%] w-[80vw] h-[80vw] rounded-full bg-orange-200/40 blur-[80px] pointer-events-none z-[-1]"></div>
  <div class="fixed bottom-[10%] right-[-20%] w-[90vw] h-[90vw] rounded-full bg-amber-100/60 blur-[100px] pointer-events-none z-[-1]"></div>

  <!-- Header -->
  <header class="w-full max-w-md px-6 pt-8 flex items-center justify-between">
    <div class="flex flex-col">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🍊</span>
        <h1 class="text-2xl font-bold text-orange-950 font-warm tracking-tight">당목담글</h1>
      </div>
      <p class="text-xs text-orange-700/80 font-medium tracking-wide mt-0.5">마음을 이어주는 따스한 목소리 릴레이</p>
    </div>
    <div class="flex gap-2">
      <!-- Database backup / restore triggers -->
      <button onclick="exportData()" title="데이터 백업" class="p-2.5 rounded-full glass-card text-orange-850 hover:bg-orange-100/50 touch-target flex items-center justify-center min-w-[44px] min-h-[44px]">
        <i data-lucide="download" class="w-5 h-5"></i>
      </button>
      <button onclick="document.getElementById('importFile').click()" title="데이터 불러오기" class="p-2.5 rounded-full glass-card text-orange-850 hover:bg-orange-100/50 touch-target flex items-center justify-center min-w-[44px] min-h-[44px]">
        <i data-lucide="upload" class="w-5 h-5"></i>
      </button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
    </div>
  </header>

  <!-- Main Container -->
  <main class="w-full max-w-md px-5 py-4 flex-grow flex flex-col justify-start gap-5">
    
    <!-- Emotion Filter & Mode Tabs -->
    <div class="glass-card rounded-2xl p-2.5 flex items-center justify-between">
      <div class="flex gap-1.5 overflow-x-auto scrollbar-none" id="emotion-tabs">
        <!-- Will be dynamically populated -->
      </div>
      
      <!-- Speech Speed Control -->
      <div class="flex items-center gap-1.5 pl-2 border-l border-orange-200/60 text-orange-900">
        <i data-lucide="gauge" class="w-4 h-4 text-orange-650"></i>
        <select id="play-speed" class="bg-transparent text-xs font-bold text-orange-900 border-none focus:outline-none pr-1 cursor-pointer">
          <option value="0.8">0.8x</option>
          <option value="1.0" selected>1.0x</option>
          <option value="1.2">1.2x</option>
          <option value="1.5">1.5x</option>
        </select>
      </div>
    </div>

    <!-- Dynamic Primer Display Card (시, 수필, 오늘의 말) -->
    <div class="glass-card rounded-3xl p-5 border-l-4 border-orange-400 bg-orange-50/50 flex flex-col gap-2">
      <div class="flex items-center justify-between">
        <span class="text-xs font-bold text-orange-800 flex items-center gap-1">
          <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
          <span id="primer-type">오늘의 마중물 말</span>
        </span>
        <button onclick="rotatePrimer()" class="p-1 rounded-full hover:bg-orange-100/50 text-orange-700 active:scale-90 transition-transform flex items-center justify-center">
          <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>
        </button>
      </div>
      <p id="primer-content" class="text-xs font-medium text-orange-950 font-warm leading-relaxed italic">
        "바람이 불어오는 곳으로 마음을 던져두면, 어느샌가 그리운 목소리가 찾아와 귀를 채웁니다."
      </p>
    </div>

    <!-- Visualizer / Emotional Blob Card -->
    <div class="glass-card rounded-3xl p-6 flex flex-col items-center justify-center min-h-[260px] relative overflow-hidden">
      <!-- Background Soft Decorative Ring -->
      <div class="absolute w-56 h-56 rounded-full border border-orange-100/30 animate-[ping_10s_infinite_linear]"></div>
      
      <canvas id="blob-canvas" width="300" height="240" class="w-full h-48 z-10"></canvas>
      
      <!-- Persona Information Display -->
      <div class="absolute bottom-4 left-0 right-0 text-center z-20">
        <p id="current-persona-text" class="text-xs font-semibold text-orange-850/70 font-warm">
          따스한 감성 큐레이터 • 하루
        </p>
      </div>
    </div>

    <!-- Controls / Action Button -->
    <div class="glass-card rounded-3xl p-5 flex flex-col gap-4 items-center">
      <!-- Status Display -->
      <div class="text-center">
        <p id="status-message" class="text-sm font-semibold text-orange-900 font-warm">아래 버튼을 눌러 목소리 마중물을 담아보세요</p>
      </div>

      <!-- Record Button -->
      <div class="relative flex items-center justify-center">
        <!-- Pulsing background ring when recording -->
        <div id="pulse-ring" class="absolute w-24 h-24 bg-red-400/20 rounded-full scale-0 transition-transform duration-500"></div>
        <button id="action-btn" onclick="toggleRecording()" class="w-20 h-20 rounded-full bg-gradient-to-br from-orange-500 to-rose-500 text-white font-bold flex flex-col items-center justify-center shadow-lg hover:scale-105 transition-all duration-300 glow-orange touch-target z-10 min-w-[44px] min-h-[44px]">
          <i data-lucide="mic" id="action-icon" class="w-8 h-8"></i>
        </button>
      </div>

      <!-- Helper info -->
      <div class="w-full flex items-center justify-center gap-1.5 text-xs text-orange-700/60 font-medium">
        <i data-lucide="info" class="w-3.5 h-3.5"></i>
        <span>당신의 따뜻한 기운이 담겨요.</span>
      </div>
    </div>

    <!-- Relay List Title -->
    <div class="flex items-center justify-between px-1">
      <h3 class="text-sm font-bold text-orange-950 font-warm flex items-center gap-1.5">
        <i data-lucide="music-4" class="w-4 h-4 text-orange-600"></i>
        <span>이어받은 따뜻한 소리들</span>
      </h3>
      <span id="relay-count" class="text-xs font-bold bg-orange-150 text-orange-800 px-2.5 py-0.5 rounded-full glass-card">0</span>
    </div>

    <!-- Relay List -->
    <div id="relay-list" class="space-y-3.5 max-h-[300px] overflow-y-auto pr-1 pb-4">
      <!-- Dynamic list items -->
    </div>

    <!-- Copyright Footer Notice -->
    <footer class="mt-4 px-2 py-4 border-t border-orange-200/40 text-[10px] text-orange-950/40 leading-relaxed text-center font-medium">
      위 글의 저작권은 행복한가에 있으며 모든 페이지 내용의 소유권은 행복한가에서 가지고 있습니다. 내용을 공유하실 때에는 글 하단 또는 제목에 '행복한가'를 반드시 표기 바랍니다.
    </footer>

  </main>

  <!-- PWA Offline Toast Warning -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-amber-950/90 text-amber-50 px-5 py-3 rounded-full text-xs font-semibold shadow-2xl z-50 flex items-center gap-2 opacity-0 transition-opacity duration-300 pointer-events-none">
    <i data-lucide="wifi-off" class="w-4 h-4 text-amber-400"></i>
    <span id="toast-text">지금은 연결이 끊겨 릴레이를 생성할 수 없어요.</span>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // 1. Dexie Database Setup
    const db = new Dexie('DangmokdamgeulDB');
    db.version(3).stores({
      personas: '++id, name, style, tone, preferredWritingStyle',
      primers: '++id, personaId, content, timestamp, weather, emotion, sensorContext, type',
      relays: '++id, primerId, personaId, content, audioBlob, timestamp, emotion'
    });

    // Populate initial default personas and actual happy letters from m-letter.or.kr
    db.on('populate', () => {
      db.personas.bulkAdd([
        { name: '하루 (위로)', style: '예쁜 일본어 구어체', tone: '따스하고 다정한 목소리', preferredWritingStyle: '소박하고 따스한 말투' },
        { name: '사쿠라 (설렘)', style: '귀엽고 낭만적인 구어체', tone: '맑고 생기 넘치는 목소리', preferredWritingStyle: '발랄하고 감성 가득한 말투' },
        { name: '렌 (평온)', style: '차분하고 정갈한 구어체', tone: '나직하고 깊은 목소리', preferredWritingStyle: '담담하면서 평화로운 말투' }
      ]);

      // Populate actual m-letter happy content (마중물 편지)
      db.primers.bulkAdd([
        { type: "오늘의 편지", emotion: "위로", content: "“삶이 어디로 향하고 있는지 방향을 잃은 것 같다고 느끼는 분들께 이런 말을 해주고 싶어요. '나는 이런 사람이야' 하면서 자신을 가두거나, '나는 안 맞아' 하면서 미리 포기하지 마세요.” — 김창완 <이제야 보이네> 중에서" },
        { type: "오늘의 편지", emotion: "위로", content: "“부디 자기 인생을 다른 사람과 비교하며 비참해지지 않았으면 좋겠습니다. 허탈함 속의 나를 발견하는 것도 나쁘지 않아요. 괜한 불안을 느끼는 일도 일상의 아름다움 아닐까요?” — 김창완 <이제야 보이네> 중에서" },
        { type: "오늘의 편지", emotion: "위로", content: "“자신을, 우리 삶을 재단하지 말아요. 어마어마한 기적을 가두지 말자고요.” — 김창완 <이제야 보이네> 중에서" },
        { type: "오늘의 편지", emotion: "위로", content: "“우리는 매일 밤 서로의 목소리에 기대어 보이지 않는 선을 잇는다. 그것은 하루를 견뎌낸 이들에게 주는 소박한 위안이다.”" },
        { type: "오늘의 편지", emotion: "위로", content: "“그늘이 깊다는 것은 그만큼 빛이 가깝다는 뜻입니다. 당신의 지친 하루에 조용히 손을 얹습니다.”" },
        
        // 설렘 (q233ZF15bi 카테고리 추가: 부모, 가족, 사랑, 마음)
        { type: "오늘의 편지", emotion: "설렘", content: "“아이들이 놀아달라고 하는 것은 부모와 눈을 맞추고 따뜻한 교감을 하고 싶다는 신호입니다. 그것이 우리 안에 숨겨진 가장 맑고 설레는 만남의 시작입니다.”" },
        { type: "오늘의 편지", emotion: "설렘", content: "“가족과 함께 보내는 여가 시간은 서로를 더 깊이 이해하고 신뢰를 쌓아가는 신비한 울타리이자, 일상 속 작은 소풍과 같습니다.”" },
        { type: "오늘의 편지", emotion: "설렘", content: "“어쩌면 오늘, 바람결에 실려 온 맑은 목소리가 당신의 마음을 가만히 두드릴지도 모릅니다. 설레는 맘으로 기다려 보세요.”" },
        { type: "오늘의 편지", emotion: "설렘", content: "“새로운 방향을 찾아 한 걸음 내딛는 일, 비록 불안할지라도 그것은 우리 삶이 꽃피기 시작하는 가장 설레는 기적입니다.”" },
        
        // 평온 (q233ZF15bi 카테고리 추가: 마음 돌보기)
        { type: "오늘의 편지", emotion: "평온", content: "“어른이 되어가는 과정에서 겪는 아픔이나 결핍을 다독이고, 스스로를 따뜻한 시선으로 바라보며 '지금' 행복해지는 마음의 자세를 배워갑니다.”" },
        { type: "오늘의 편지", emotion: "평온", content: "“모두에게 무리하여 좋은 사람이 되려 하기보다, 내 마음의 온기를 먼저 돌볼 때 비로소 진정한 평화가 깃듭니다.”" },
        { type: "오늘의 편지", emotion: "평온", content: "“'나는 이런 사람이야'라며 억지로 규정하지 않을 때, 마음속에는 비로소 고요하고 넓은 평온함이 찾아옵니다.”" },
        { type: "오늘의 편지", emotion: "평온", content: "“불안마저 일상의 자연스러운 부분으로 받아들이고 흘려보낼 때, 우리의 일상은 가장 정갈하고 평화로워집니다.”" },
        { type: "오늘의 편지", emotion: "평온", content: "“아무 일도 일어나지 않는 오후, 가볍게 스쳐 가는 새소리와 바람 소리 속에 우리의 평화가 조용히 깃들어 있다.”" }
      ]);
    });

    // Open DB
    db.open().then(async () => {
      // Safe fallback: If on('populate') did not run because DB already exists, manually insert if empty.
      const primerCount = await db.primers.count();
      if (primerCount === 0) {
        await db.personas.bulkAdd([
          { name: '하루 (위로)', style: '예쁜 일본어 구어체', tone: '따스하고 다정한 목소리', preferredWritingStyle: '소박하고 따스한 말투' },
          { name: '사쿠라 (설렘)', style: '귀엽고 낭만적인 구어체', tone: '맑고 생기 넘치는 목소리', preferredWritingStyle: '발랄하고 감성 가득한 말투' },
          { name: '렌 (평온)', style: '차분하고 정갈한 구어체', tone: '나직하고 깊은 목소리', preferredWritingStyle: '담담하면서 평화로운 말투' }
        ]);
        await db.primers.bulkAdd([
          { type: "오늘의 편지", emotion: "위로", content: "“삶이 어디로 향하고 있는지 방향을 잃은 것 같다고 느끼는 분들께 이런 말을 해주고 싶어요. '나는 이런 사람이야' 하면서 자신을 가두거나, '나는 안 맞아' 하면서 미리 포기하지 마세요.” — 김창완 <이제야 보이네> 중에서" },
          { type: "오늘의 편지", emotion: "위로", content: "“부디 자기 인생을 다른 사람과 비교하며 비참해지지 않았으면 좋겠습니다. 허탈함 속의 나를 발견하는 것도 나쁘지 않아요. 괜한 불안을 느끼는 일도 일상의 아름다움 아닐까요?” — 김창완 <이제야 보이네> 중에서" },
          { type: "오늘의 편지", emotion: "위로", content: "“자신을, 우리 삶을 재단하지 말아요. 어마어마한 기적을 가두지 말자고요.” — 김창완 <이제야 보이네> 중에서" },
          { type: "오늘의 편지", emotion: "위로", content: "“우리는 매일 밤 서로의 목소리에 기대어 보이지 않는 선을 잇는다. 그것은 하루를 견뎌낸 이들에게 주는 소박한 위안이다.”" },
          { type: "오늘의 편지", emotion: "위로", content: "“그늘이 깊다는 것은 그만큼 빛이 가깝다는 뜻입니다. 당신의 지친 하루에 조용히 손을 얹습니다.”" },
          { type: "오늘의 편지", emotion: "설렘", content: "“아이들이 놀아달라고 하는 것은 부모와 눈을 맞추고 따뜻한 교감을 하고 싶다는 신호입니다. 그것이 우리 안에 숨겨진 가장 맑고 설레는 만남의 시작입니다.”" },
          { type: "오늘의 편지", emotion: "설렘", content: "“가족과 함께 보내는 여가 시간은 서로를 더 깊이 이해하고 신뢰를 쌓아가는 신비한 울타리이자, 일상 속 작은 소풍과 같습니다.”" },
          { type: "오늘의 편지", emotion: "설렘", content: "“어쩌면 오늘, 바람결에 실려 온 맑은 목소리가 당신의 마음을 가만히 두드릴지도 모릅니다. 설레는 맘으로 기다려 보세요.”" },

    // Audio Engine
    class AudioPlayerEngine {
      constructor() {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.audioContext.createAnalyser();
        this.analyser.fftSize = 64;
        this.analyser.connect(this.audioContext.destination);
        this.playbackRate = 1.0;
        this.nextStartTime = 0;
      }

      setSpeed(rate) {
        this.playbackRate = rate;
      }

      async playChunk(arrayBuffer) {
        if (this.audioContext.state === 'suspended') {
          await this.audioContext.resume();
        }
        
        try {
          const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
          const source = this.audioContext.createBufferSource();
          source.buffer = audioBuffer;
          source.playbackRate.value = this.playbackRate;
          
          source.connect(this.analyser);
          source.connect(this.audioContext.destination);

          const currentTime = this.audioContext.currentTime;
          if (this.nextStartTime < currentTime) {
            this.nextStartTime = currentTime;
          }
          
          source.start(this.nextStartTime);
          this.nextStartTime += audioBuffer.duration / this.playbackRate;
        } catch (e) {
          console.error("오디오 재생 실패:", e);
        }
      }
    }

    // Canvas Blob Visualizer
    const canvas = document.getElementById('blob-canvas');
    const ctx = canvas.getContext('2d');
    let time = 0;

    function drawBlob() {
      canvasAnimationId = requestAnimationFrame(drawBlob);
      
      const bufferLength = audioEngine.analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      audioEngine.analyser.getByteFrequencyData(dataArray);

      let sum = 0;
      for (let i = 0; i < bufferLength; i++) {
        sum += dataArray[i];
      }
      const avg = sum / bufferLength;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // Gentle pulsing base radius based on sound
      const baseRadius = 55 + avg * 0.45;

      // Draw soft outer radiant gradient
      const outerGlow = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, baseRadius * 1.8);
      outerGlow.addColorStop(0, 'rgba(251, 146, 60, 0.35)');
      outerGlow.addColorStop(0.5, 'rgba(244, 63, 94, 0.15)');
      outerGlow.addColorStop(1, 'rgba(255, 238, 219, 0)');
      
      ctx.beginPath();
      ctx.arc(centerX, centerY, baseRadius * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = outerGlow;
      ctx.fill();

      // Draw the organic moving Blob shape
      ctx.beginPath();
      const points = 12;
      for (let i = 0; i < points; i++) {
        const angle = (i / points) * Math.PI * 2;
        // Apply sinusoidal waves combined with sound volume to give organic feeling
        const offset = Math.sin(angle * 3 + time) * 6 + Math.cos(angle * 2 - time * 0.5) * 4 + (avg > 0 ? (dataArray[i % bufferLength] / 255) * 15 : 0);
        const r = baseRadius + offset;
        const x = centerX + Math.cos(angle) * r;
        const y = centerY + Math.sin(angle) * r;
        
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.closePath();
      
      const blobGrad = ctx.createLinearGradient(centerX - baseRadius, centerY - baseRadius, centerX + baseRadius, centerY + baseRadius);
      blobGrad.addColorStop(0, '#f97316'); // Orange
      blobGrad.addColorStop(1, '#ec4899'); // Pink
      
      ctx.fillStyle = blobGrad;
      ctx.shadowColor = 'rgba(244, 63, 94, 0.3)';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0; // reset shadow

      // Core light accent
      ctx.beginPath();
      ctx.arc(centerX - 10, centerY - 15, baseRadius * 0.25, 0, Math.PI * 2);
      const coreGrad = ctx.createRadialGradient(centerX - 10, centerY - 15, 0, centerX - 10, centerY - 15, baseRadius * 0.25);
      coreGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
      coreGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = coreGrad;
      ctx.fill();

      time += 0.035;
    }

    // Play a single relay audio item
    async function playRelay(id) {
      const relay = await db.relays.get(id);
      if (!relay) return;

      const speedSelect = document.getElementById('play-speed');
      const playbackRate = parseFloat(speedSelect.value);
      audioEngine.setSpeed(playbackRate);

      // Visual feedback on visualizer
      const personaDisplay = document.getElementById('current-persona-text');
      personaDisplay.textContent = `당목담글 재생 중 • ${relay.emotion} 릴레이`;

      // 1. Play back original recorded voice (Korean)
      if (relay.audioBlob) {
        const arrayBuffer = await relay.audioBlob.arrayBuffer();
        await audioEngine.playChunk(arrayBuffer);
      }

      // 2. Speak matching Japanese translation text using Web Speech API (TTS)
      if (relay.content) {
        // Extract Japanese characters inside parentheses if present, otherwise read full text
        const jpRegex = /\(([^)]+)\)/;
        const match = relay.content.match(jpRegex);
        const speechText = match ? match[1] : relay.content;

        // Cancel previous speech if running
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(speechText);
        utterance.lang = 'ja-JP'; // Set language to Japanese
        utterance.rate = playbackRate; // Apply custom speed rate
        
        // Find a warm Japanese female voice if available
        const voices = window.speechSynthesis.getVoices();
        const jaVoice = voices.find(v => v.lang.startsWith('ja') && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Microsoft')));
        if (jaVoice) {
          utterance.voice = jaVoice;
        }

        window.speechSynthesis.speak(utterance);
      }
    }

    // Export Dexie Database to JSON file
    async function exportData() {
      try {
        const relays = await db.relays.toArray();
        // Convert Blobs to base64 for JSON serialization
        const serializedRelays = await Promise.all(relays.map(async (r) => {
          const buffer = await r.audioBlob.arrayBuffer();
          const base64 = btoa(String.fromCharCode(...new Uint8Array(buffer)));
          return {
            ...r,
            audioBlobBase64: base64,
            audioBlob: undefined // clear to avoid serialization crash
          };
        }));

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(serializedRelays));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `dangmokdamgeul_backup_${Date.now()}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast("데이터 백업 파일이 저장되었습니다.");

    // Import Dexie Database from JSON file
    async function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const rawRelays = JSON.parse(e.target.result);
          
          await db.relays.clear();
          
          for (let r of rawRelays) {
            // Restore Base64 to Blob
            const binaryStr = atob(r.audioBlobBase64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
              bytes[i] = binaryStr.charCodeAt(i);
            }
            const audioBlob = new Blob([bytes], { type: 'audio/webm' });
            
            await db.relays.add({
              emotion: r.emotion,
              content: r.content,
              timestamp: r.timestamp || Date.now(),
              audioBlob: audioBlob
            });
          }
          
          showToast("데이터를 성공적으로 복원했습니다!");
          loadRelays();
        } catch (err) {
          console.error("가져오기 에러:", err);
          showToast("잘못된 백업 파일 형식입니다.");
        }
      };
      reader.readAsText(file);
    }

    // Initial Loading
    window.addEventListener('load', async () => {
      await loadPrimersFromDB();
      updatePrimerUI(); // Ensure primer text is rendered on start
      loadRelays();

      // PWA Service Worker Registration
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('서비스 워커가 등록되었습니다!', reg))
          .catch(err => console.error('서비스 워커 등록 실패:', err));
      }
    });

  </script>
</body>
</html>
